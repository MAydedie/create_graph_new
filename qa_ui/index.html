<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QA parity page</title><style>body{font-family:Arial;margin:18px;background:#0f172a;color:#e2e8f0}.c{background:#111827;border:1px solid #334155;border-radius:10px;padding:12px}.g{display:grid;grid-template-columns:380px 1fr;gap:12px}input,textarea{width:100%;box-sizing:border-box;background:#020617;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:9px}textarea{min-height:90px}button{margin-top:10px;background:#2563eb;color:#fff;border:0;border-radius:8px;padding:8px 12px;cursor:pointer}button:disabled{opacity:.6}pre{white-space:pre-wrap;max-height:280px;overflow:auto;background:#020617;border:1px solid #334155;border-radius:8px;padding:8px}.tl{list-style:none;padding:0}.tl li{border-left:2px solid #334155;padding:5px 8px;margin-left:6px}.tag{display:inline-block;font-size:11px;border:1px solid #475569;border-radius:999px;padding:2px 6px;margin-right:5px}.muted{color:#94a3b8;font-size:12px}.opt{width:100%;text-align:left;background:#1f2937;border:1px solid #475569}.opt.a{background:#312e81;border-color:#a78bfa}.row{display:flex;gap:8px;align-items:center}.row>*{flex:1}.split{display:flex;justify-content:space-between;gap:8px;align-items:center}.lib-list{max-height:180px;overflow:auto;border:1px solid #334155;border-radius:8px;padding:6px;background:#020617}.lib-item{display:flex;align-items:flex-start;gap:8px;padding:6px;border-bottom:1px dashed #334155}.lib-item:last-child{border-bottom:none}.pill{display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;border:1px solid #475569;color:#cbd5e1}</style></head><body><h3>QA parity extraction</h3><div class="muted">Includes SSE progress, clarification context, handoff, and manual multi-agent continuation. Port 5123.</div><div class="g"><div class="c"><label>project_path</label><input id="pp" value="D:\代码仓库生图\create_graph"><label>output_root(optional)</label><input id="or" placeholder="D:\代码仓库生图\汇报.20\code test" /><label>experience_output_root(optional)</label><input id="eor" placeholder="留空用默认 output_analysis" /><div class="row"><button id="refreshLibBtn" class="secondary">刷新经验库</button><button id="trainBtn" class="warn">训练经验库</button></div><div class="muted">提示：新项目建议先训练经验库，问答与代码生成效果更稳。</div><div class="split" style="margin-top:6px"><strong>经验库选择(可多选)</strong><div><button id="selectAllBtn" class="secondary" style="margin-top:0;padding:4px 8px">全选</button><button id="clearSelBtn" class="secondary" style="margin-top:0;padding:4px 8px">清空</button></div></div><div id="libSummary" class="muted">尚未加载经验库</div><div id="libList" class="lib-list"></div><div id="selectedEcho" class="muted">已选择：无</div><label>query / clarification reply</label><textarea id="q"></textarea><button id="go">Start QA</button><button id="ma" disabled>Manual Multi-Agent</button><div id="cw" style="display:none"><h4>Clarification</h4><pre id="cp"></pre><div id="co"></div><button id="rp">Submit Clarification</button></div></div><div class="c"><div><span class="tag" id="ts">idle</span><span class="tag" id="tg">-</span><span class="tag" id="ssid">sid:-</span><span class="tag" id="cid">cid:-</span></div><h4>Experience Training</h4><pre id="wb">未开始训练</pre><h4>Timeline</h4><ul id="tl" class="tl"></ul><h4>Status</h4><pre id="st">idle</pre><h4>Result</h4><pre id="rt">none</pre></div></div><script>
const S={cid:null,sid:null,cursor:0,clar:null,handoff:null,loading:false,abort:null,libs:[],selectedLibs:[],wbSessionId:null};

const inf=q=>{q=(q||'').trim();if(!q)return null;const a=q.match(/[\"“”']([A-Za-z]:[\/][^\"“”']+)[\"“”']/);const b=q.match(/([A-Za-z]:[\/][^\"“”<>|?*]+?)(?=\s+(?:下|中|里|内|目录|文件夹|生成|创建|写入|输出)|[，。；;,]|$)/);let c=(a&&a[1])||(b&&b[1]);if(!c)return null;return c.trim().replace(/[\"“”']/g,'').replace(/[，。；;]+$/,'').replace(/[\/]+$/,'')||null};
async function fj(u,o={}){const r=await fetch(u,o);let p=null;try{p=await r.json()}catch{p=await r.text()}if(!r.ok)throw new Error((p&&p.error)||((typeof p==='string'&&p)||('Request failed:'+r.status)));return p}

function ps(b){const L=b.split(/\n/).map(x=>x.replace(/\r$/,''));let ev='message',id;const d=[];for(const l of L){if(!l||l.startsWith(':'))continue;if(l.startsWith('event:')){ev=l.slice(6).trim()||'message';continue}if(l.startsWith('id:')){const n=Number(l.slice(3).trim());if(Number.isFinite(n))id=n;continue}if(l.startsWith('data:'))d.push(l.slice(5).trimStart())}if(!d.length)return null;let data=d.join(String.fromCharCode(10));try{data=JSON.parse(data)}catch{}return{ev,id,data}}
function hEv(ev,p){if(ev==='turn.state_changed'){rs({sessionId:S.sid,conversationId:S.cid,status:p.status||'running',stage:p.stage||'running',message:p.message||''});tlg((p.stage||'running')+'|'+(p.message||p.status||''));return}if(ev==='turn.decided'){tlg('decide|'+(p.action||'unknown'));return}if(ev==='retrieval.progress'){tlg(p.message||'retrieval');return}if(ev==='tool.run_hybrid_shadow.completed'){tlg('retrieval done|hits '+(p.highlightsCount||0));return}if(ev==='clarification.requested'){tlg('clarification requested');return}if(ev==='task.handoff.auto_started'){tlg('auto-started multi-agent');return}if(ev==='multi_agent.started'){tlg('multi-agent started');return}if(ev==='multi_agent.stage'){tlg('swarm|'+(p.stage||'unknown')+'|'+(p.message||''));return}if(ev==='swarm.agent.updated'){tlg('swarm agent|'+(p.agent||'agent'));return}if(ev==='swarm.consensus.updated'){tlg('swarm consensus');return}if(ev==='multi_agent.completed'){tlg('multi-agent completed');return}if(ev==='multi_agent.failed'){tlg('multi-agent failed|'+(p.error||''));return}}
function cState(pq,oq){const opts=Array.isArray(pq.options)?pq.options:[];return{id:String(pq.questionId||('clarify-'+Date.now())),prompt:String(pq.question||pq.prompt||'need clarification'),round:Number(pq.round||1),maxRounds:Number(pq.maxRounds||3),inferredIntent:String(pq.inferredIntent||''),originalQuery:String(pq.originalQuery||oq||''),options:opts,selectedOptionLabels:[]}}
function rClar(){const c=S.clar;if(!c){E.cw.style.display='none';E.co.innerHTML='';return}E.cw.style.display='block';E.cp.textContent=c.prompt+String.fromCharCode(10)+'round '+c.round+'/'+c.maxRounds;E.co.innerHTML='';c.options.forEach(o=>{const lb=String(o.label||o.id||'option');const ds=String(o.description||'');const b=document.createElement('button');b.type='button';b.className='opt'+(c.selectedOptionLabels.includes(lb)?' a':'');b.textContent=ds?(lb+' - '+ds):lb;b.onclick=()=>{S.clar.selectedOptionLabels=[lb];E.q.value=String(o.promptFragment||ds||lb);rClar()};E.co.appendChild(b)})}

async function sse(cid,sid,since){if(!cid)return;if(S.abort)S.abort.abort();S.abort=new AbortController();const q=new URLSearchParams();q.set('since',String(Math.max(0,Math.floor(since))));if(sid)q.set('session_id',sid);q.set('timeout','180');q.set('intervalMs','700');const r=await fetch('/api/conversations/'+encodeURIComponent(cid)+'/events?'+q.toString(),{headers:{Accept:'text/event-stream','Cache-Control':'no-cache'},signal:S.abort.signal});if(!r.ok||!r.body)throw new Error('SSE '+r.status);const rd=r.body.getReader();const dc=new TextDecoder();let bf='';while(true){const x=await rd.read();if(x.done)break;bf+=dc.decode(x.value,{stream:true});const bs=bf.split(/\r?\n\r?\n/);bf=bs.pop()||'';for(const b of bs){const p=ps(b);if(!p)continue;if(typeof p.id==='number'&&Number.isFinite(p.id))S.cursor=Math.max(S.cursor,p.id);const d=(p.data&&typeof p.data==='object')?p.data:{};if(typeof d.seq==='number'&&Number.isFinite(d.seq))S.cursor=Math.max(S.cursor,d.seq);hEv(p.ev,d)}}try{await rd.cancel()}catch{}}

function hState(q,cid,h){h=(h&&typeof h==='object')?h:{};return{query:String(h.query||q||''),conversationId:String(cid||''),sessionId:h.multiAgentSessionId?String(h.multiAgentSessionId):null,projectPath:String(h.project_path||E.pp.value.trim()),taskMode:String(h.task_mode||'generate_artifacts'),partitionId:h.partition_id?String(h.partition_id):null,selectedNode:(h.selected_node&&typeof h.selected_node==='object')?h.selected_node:null,clarificationContext:(h.clarification_context&&typeof h.clarification_context==='object')?h.clarification_context:{},outputRoot:h.output_root?String(h.output_root):null,autoApplyOutput:Boolean(h.auto_apply_output),opencodeEnabled:h.opencode_enabled!==false,status:String(h.status||'pending'),stage:String(h.stage||'start_multi_agent'),message:String(h.message||'switched to multi-agent')}}

async function submit(){if(S.loading)return;const pp=E.pp.value.trim(),q=E.q.value.trim();if(!pp||!q){rs('error: project_path and query are required');return}setL(true);try{const or=E.or.value.trim();const infOr=inf(q);const eff=or||infOr||'';const aa=Boolean(eff);const libs=prioritizedLibs();const cc=S.clar?{id:S.clar.id,round:S.clar.round,originalQuery:S.clar.originalQuery,latestUserReply:q,selectedOptionLabels:S.clar.selectedOptionLabels||[],prioritizedExperienceLibraries:libs}:{prioritizedExperienceLibraries:libs};const payload=(S.clar&&S.cid)?{project_path:pp,answer:q,selectedOptionLabels:S.clar.selectedOptionLabels||[],clarification_context:cc,auto_start_multi_agent:aa,opencode_enabled:true,output_root:eff||undefined,auto_apply_output:aa}:{query:q,project_path:pp,conversation_id:S.cid||undefined,clarification_context:cc,auto_start_multi_agent:aa,opencode_enabled:true,output_root:eff||undefined,auto_apply_output:aa};const sr=(S.clar&&S.cid)?await fj('/api/conversations/'+encodeURIComponent(S.cid)+'/reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}):await fj('/api/conversations/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});await cFlow(sr,q)}catch(e){rs('error: '+(e&&e.message||String(e)));tlg('error|'+(e&&e.message||String(e)))}finally{setL(false)}}
